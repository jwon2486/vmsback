<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 전체 출입 기록</title>
    <script src="/js/visitor-history.js" defer></script>
    <script src="/js/admin.js" defer></script>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* iframe 임베드 전용: 배경/여백 최소화하여 관리자 tab-panel만 깔끔히 노출 */
        body { background: #fff; }
        .records-shell { padding: 1rem 1.25rem; max-width: none; }
    </style>
</head>
<body>
    <main class="shell records-shell">
        <section class="erp-content">
            <div id="tabContentVisitor" class="tab-panel">
                <div class="admin-header">
                    <h2>📊 방문객 출입 기록</h2>
                    <button class="btn-excel" onclick="downloadExcel()">📊 엑셀 저장</button>
                </div>

                <div class="filter-bar">
                    <label class="filter-label">📅 기록 조회 필터: </label>
                    <div class="date-range-picker-box">
                        <input type="date" id="adminStartDate" onchange="loadAdminLogs()">
                        <span class="range-tilde">~</span>
                        <input type="date" id="adminEndDate" onchange="loadAdminLogs()">
                    </div>
                </div>

                <div class="admin-stat-grid">
                    <div class="admin-stat-card stat-total">
                        <span class="admin-stat-label">👥 입실 인원 (실제 방문)</span>
                        <span class="admin-stat-value" id="adminStatTotal">-</span>
                    </div>
                    <div class="admin-stat-card stat-complete">
                        <span class="admin-stat-label">✅ 입·퇴실 모두 완료</span>
                        <span class="admin-stat-value" id="adminStatComplete">-</span>
                    </div>
                    <div class="admin-stat-card stat-incomplete">
                        <span class="admin-stat-label">⏳ 재실 중 (퇴실 전)</span>
                        <span class="admin-stat-value" id="adminStatIncomplete">-</span>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>순번</th>
                                <th>방문일</th>
                                <th class="col-split-visitor">이름</th>
                                <th class="col-split-visitor">연락처</th>
                                <th class="col-merged-visitor">방문객</th>
                                <th>방문 횟수</th>
                                <th>소속</th>
                                <th>방문 목적</th>
                                <th>담당자</th>
                                <th class="col-split-time">입실 시간</th>
                                <th class="col-split-time">퇴실 시간</th>
                                <th class="col-merged-time">입·퇴실</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody id="adminLogBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
